<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Caller Profiles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: #f5f6f8;
      font-family: Arial, sans-serif;
    }

    .card-custom {
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      padding: 25px;
    }

    .top-btn {
      background: #ff7a00;
      color: white;
      border-radius: 10px;
      padding: 10px 18px;
      border: none;
    }

    .top-btn:hover {
      background: #e56d00;
    }

    .chip {
      display: inline-block;
      padding: 6px 12px;
      margin: 4px;
      background: #f1f1f1;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .chip:hover {
      background: #ddd;
    }

    .form-control {
      border-radius: 10px;
      padding: 10px;
    }

    .btn-create {
      background: #dcdcdc;
      border-radius: 10px;
      padding: 10px 20px;
      border: none;
      color: white;
    }

    .cancel-btn {
      background: none;
      border: none;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold"><i class="fa-solid fa-user"></i>Caller Profiles</h4>
      <p class="text-muted mb-0">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Eaque </p>
    </div>
    <button class="top-btn">+ Add Contact</button>
  </div>

  
  <div class="card card-custom">

    <h5 class="mb-4 fw-bold">New Contact</h5>

    <div class="row">
      
   
      <div class="col-md-6 mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter Your Name">
      </div>

      
      <div class="col-md-6 mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" class="form-control" placeholder="+92********">
      </div>

 
      <div class="col-md-6 mb-3">
        <label class="form-label">Relationship</label><br>
        <span class="chip">Boss</span>
        <span class="chip">Family</span>
        <span class="chip">Roommate</span>
        <span class="chip">Best Friend</span>
        <span class="chip">Doctor</span>
        <span class="chip">Coworker</span>
        <span class="chip">Partner</span>
        <span class="chip">Neighbor</span>
      </div>

     
      <div class="col-md-6 mb-3">
        <label class="form-label">Initials (Avatar)</label>
        <input type="text" class="form-control" placeholder="SM">
      </div>

    </div>

    
    <div class="d-flex justify-content-end mt-4">
      <button class="cancel-btn me-3">Cancel</button>
      <button class="btn-create">✔ Create Contact</button>
    </div>

  </div>

</div>

</body>
</html>
